<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photon | STEM Team</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        :root {
            --primary-yellow: #ffeb00;  
            --deep-black: #000000;      
            --card-bg: rgba(12, 12, 12, 0.85);
            --text-light: #ffffff;
            --text-muted: #aaaaaa;
            --text-dark: #000000;
            --scroll-y: 0px;
        }
        html { scroll-behavior: smooth; background-color: var(--deep-black); }
        body { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; background-color: var(--deep-black); color: var(--text-light); overflow-x: hidden; position: relative; }
        
        #bg-grid-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-image: linear-gradient(rgba(255, 235, 0, 0.07) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 235, 0, 0.07) 1px, transparent 1px); background-size: 60px 60px; background-position-y: calc(var(--scroll-y) * -0.15); z-index: 1; pointer-events: none; }
        #glow-particles-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2; pointer-events: none; overflow: hidden; }
        
        /* SYNCED GLOW SYSTEM */
        .glow-particle {
            position: absolute;
            width: 20px; height: 20px;
            background-color: var(--primary-yellow);
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 20px 5px rgba(255, 235, 0, 0.5);
            will-change: transform;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .reveal { opacity: 0; transform: translateY(40px); transition: opacity 1s cubic-bezier(0.215, 0.610, 0.355, 1), transform 1s cubic-bezier(0.215, 0.610, 0.355, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        nav { display: flex; justify-content: space-between; align-items: center; padding: 30px 60px; background-color: rgba(0, 0, 0, 0.95); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255, 235, 0, 0.15); position: sticky; top: 0; z-index: 100; }
        .nav-left-cluster { display: flex; align-items: center; gap: 25px; }
        nav h1 { color: var(--primary-yellow); margin: 0; letter-spacing: 6px; font-weight: 900; font-size: 1.6rem; cursor: pointer; }
        .studio-toggle-btn { background: transparent; border: 1px solid rgba(255, 235, 0, 0.4); color: var(--primary-yellow); padding: 8px 18px; border-radius: 4px; font-weight: 700; cursor: pointer; transition: all 0.4s; }
        .studio-toggle-btn.active-studio { background: var(--primary-yellow); color: #000; }
        nav ul { list-style: none; display: flex; gap: 25px; margin: 0; }
        nav a { color: var(--text-light); text-decoration: none; font-weight: 700; font-size: 0.8rem; opacity: 0.8; }
        nav a:hover { color: var(--primary-yellow); }

        #hero { position: relative; width: 100vw; height: calc(100vh - 95px); min-height: 650px; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        #hero-text-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: flex-start; padding-top: 7vh; align-items: center; z-index: 15; pointer-events: none; }
        #hero h2 { font-size: 7.5rem; text-transform: uppercase; margin: 0; font-weight: 900; color: var(--primary-yellow); }
        
        #car-viewer { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 12; display: flex; flex-direction: column; overflow: hidden; }
        model-viewer { width: 100%; height: 100%; background: transparent !important; --interpolation-decay: 5; }
        
        .fullscreen-toggle { position: absolute; bottom: 140px; left: 60px; z-index: 25; background: rgba(10, 10, 10, 0.85); border: 1px solid rgba(255, 235, 0, 0.4); color: #fff; padding: 12px 24px; border-radius: 4px; cursor: pointer; opacity: 0; pointer-events: none; }
        .fullscreen-toggle.visible-widget { opacity: 1; pointer-events: auto; }
        
        .viewer-details { position: absolute; bottom: 0; left: 0; width: 100%; padding: 45px 60px; background: linear-gradient(to top, rgba(0,0,0,1) 0%, transparent 100%); z-index: 20; display: flex; justify-content: space-between; }
        .instagram-btn { background: linear-gradient(45deg, #f09433, #bc1888); color: #fff; padding: 15px 30px; border-radius: 4px; text-decoration: none; font-weight: 700; }
        
        /* Add your sections here as per previous code... */
        /* ...Sections CSS remain intact... */
    </style>
</head>
<body>
    <div id="bg-grid-overlay"></div>
    <div id="glow-particles-container"></div>
    <!-- Nav, Hero, Sections remain unchanged... -->

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const viewer = document.getElementById('animated-car');
        const container = document.getElementById('glow-particles-container');
        const particles = [];

        // 1. Create synced orbs
        function initSyncedOrbs() {
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'glow-particle';
                p.dataset.x = (Math.random() - 0.5) * 5;
                p.dataset.y = (Math.random() - 0.5) * 2;
                p.dataset.z = (Math.random() - 0.5) * 5;
                container.appendChild(p);
                particles.push(p);
            }
            updateOrbPositions();
        }

        // 2. The high-performance sync engine
        function updateOrbPositions() {
            particles.forEach(p => {
                const worldPos = { x: parseFloat(p.dataset.x), y: parseFloat(p.dataset.y), z: parseFloat(p.dataset.z) };
                const screenPos = viewer.positionToScreenCoordinates(worldPos);
                
                if (screenPos) {
                    p.style.opacity = '1';
                    p.style.transform = `translate(${screenPos.x}px, ${screenPos.y}px)`;
                } else {
                    p.style.opacity = '0';
                }
            });
            requestAnimationFrame(updateOrbPositions);
        }

        viewer.addEventListener('load', () => {
            initSyncedOrbs();
            // ... existing your cinematic logic ...
        });

        // ... existing scroll and interaction listeners ...
    </script>
</body>
</html>
